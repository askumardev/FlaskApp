{% extends 'layouts/base.html' %}

{% block content %}
<h1>Edit Comment</h1>
<form method="post">
  <textarea name="content" required>{{ comment.content }}</textarea><br>
  <select name="post_id" required>
    {% for post in posts %}
    <option value="{{ post.id }}" {% if post.id == comment.post_id %}selected{% endif %}>{{ post.title }}</option>
    {% endfor %}
  </select><br>
  <select name="user_id" required>
    {% for user in users %}
    <option value="{{ user.id }}" {% if user.id == comment.user_id %}selected{% endif %}>{{ user.username }}</option>
    {% endfor %}
  </select><br>
  <button type="submit">Update</button>
</form>
<a href="{{ url_for('comments') }}">Back to Comments</a>
{% endblock %}
