{% extends 'layouts/base.html' %}

{% block content %}
<h1>Users</h1>
<a href="{{ url_for('users_new') }}">New User</a>
<ul>
  {% for user in users %}
  <li>
    <a href="{{ url_for('users_show', id=user.id) }}">{{ user.username }}</a> - {{ user.email }}
    <a href="{{ url_for('users_edit', id=user.id) }}">Edit</a>
    <form method="post" action="{{ url_for('users_delete', id=user.id) }}" style="display:inline;">
      <button type="submit" onclick="return confirm('Delete user?')">Delete</button>
    </form>
  </li>
  {% endfor %}
</ul>
{% endblock %}
