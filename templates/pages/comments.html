{% extends 'layouts/base.html' %}

{% block content %}
<h1>Comments</h1>
<ul>
{% for comment in comments %}
<li>On "{{ comment.post.title }}" by {{ comment.commenter.username }}: {{ comment.content }}
  <a href="{{ url_for('edit_comment', id=comment.id) }}">Edit</a>
  <form method="post" action="{{ url_for('delete_comment', id=comment.id) }}" style="display:inline;">
    <button type="submit" onclick="return confirm('Are you sure?')">Delete</button>
  </form>
</li>
{% endfor %}
</ul>

<h2>Add New Comment</h2>
<form method="post">
  <textarea name="content" placeholder="Comment" required></textarea><br>
  <select name="post_id" required>
    <option value="">Select Post</option>
    {% for post in posts %}
    <option value="{{ post.id }}">{{ post.title }}</option>
    {% endfor %}
  </select><br>
  <select name="user_id" required>
    <option value="">Select Commenter</option>
    {% for user in users %}
    <option value="{{ user.id }}">{{ user.username }}</option>
    {% endfor %}
  </select><br>
  <button type="submit">Add Comment</button>
</form>
{% endblock %}
