<form method="post">
  <div>
    <label for="title">Title</label>
    <input name="title" id="title" type="text" value="{{ post.title if post else '' }}" required>
  </div>
  <div>
    <label for="content">Content</label>
    <textarea name="content" id="content" required>{{ post.content if post else '' }}</textarea>
  </div>
  <div>
    <label for="user_id">Author</label>
    <select name="user_id" id="user_id" required>
      <option value="">Choose one</option>
      {% for user in users %}
      <option value="{{ user.id }}" {% if post and user.id == post.user_id %}selected{% endif %}>{{ user.username }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit">{{ button_text }}</button>
</form>
