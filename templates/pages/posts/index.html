{% extends 'layouts/base.html' %}

{% block content %}
<h1>Posts</h1>
<a href="{{ url_for('posts_new') }}">New Post</a>
<ul>
  {% for post in posts %}
  <li>
    <a href="{{ url_for('posts_show', id=post.id) }}">{{ post.title }}</a> by {{ post.author.username }}
    <a href="{{ url_for('posts_edit', id=post.id) }}">Edit</a>
    <form method="post" action="{{ url_for('posts_delete', id=post.id) }}" style="display:inline;">
      <button type="submit" onclick="return confirm('Delete post?')">Delete</button>
    </form>
  </li>
  {% endfor %}
</ul>
{% endblock %}
