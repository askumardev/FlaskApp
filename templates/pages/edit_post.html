{% extends 'layouts/base.html' %}

{% block content %}
<h1>Edit Post</h1>
<form method="post">
  <input type="text" name="title" value="{{ post.title }}" required><br>
  <textarea name="content" required>{{ post.content }}</textarea><br>
  <select name="user_id" required>
    {% for user in users %}
    <option value="{{ user.id }}" {% if user.id == post.user_id %}selected{% endif %}>{{ user.username }}</option>
    {% endfor %}
  </select><br>
  <button type="submit">Update</button>
</form>
<a href="{{ url_for('posts') }}">Back to Posts</a>
{% endblock %}
